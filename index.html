<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Grubs TD">
<title>Grubs TD — defend the sugar stash</title>
<meta name="theme-color" content="#63a832">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="stylesheet" href="css/style.css">
<script>
// Boot safety net: if anything throws before the game comes up (common on older phone
// browsers), show the error instead of a blank screen — and offer a cache-clear reload,
// which fixes a stale/broken cached build (the usual "worked yesterday, blank today").
(function () {
  function showErr(msg) {
    var d = document.getElementById('boot-error');
    if (!d) {
      d = document.createElement('div');
      d.id = 'boot-error';
      d.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#2b1a10;color:#ffe9a8;'
        + 'font:14px/1.5 -apple-system,system-ui,sans-serif;padding:24px;overflow:auto;-webkit-text-size-adjust:100%';
      (document.body || document.documentElement).appendChild(d);
    }
    d.innerHTML = '<h2 style="margin:0 0 8px;font-size:20px">Grubs TD hit a snag loading 🐜</h2>'
      + '<p style="margin:0 0 12px;opacity:.85">Tap the button below first. If it still fails, screenshot this and send it over.</p>'
      + '<button id="be-fix" style="padding:12px 18px;font:inherit;font-weight:700;background:#f5a623;'
      + 'border:2px solid #ffe9a8;border-radius:10px;color:#2b1a10;margin-bottom:14px">Clear cache &amp; reload</button>'
      + '<pre style="white-space:pre-wrap;background:rgba(0,0,0,.3);padding:12px;border-radius:8px;'
      + 'font-size:12px;margin:0">' + String(msg).replace(/</g, '&lt;') + '</pre>';
    document.getElementById('be-fix').onclick = function () {
      Promise.resolve()
        .then(function () {
          if (navigator.serviceWorker) return navigator.serviceWorker.getRegistrations()
            .then(function (rs) { return Promise.all(rs.map(function (r) { return r.unregister(); })); });
        })
        .then(function () { if (window.caches) return caches.keys().then(function (ks) { return Promise.all(ks.map(function (k) { return caches.delete(k); })); }); })
        .catch(function () {})
        .then(function () { location.reload(); });
    };
  }
  window.addEventListener('error', function (e) {
    if (e.target && e.target !== window && e.target.tagName) return; // ignore failed <img>/<audio>, not script errors
    showErr((e.message || 'Script error') + (e.filename ? '\n' + e.filename + ':' + (e.lineno || '?') : ''));
  });
  window.addEventListener('unhandledrejection', function (e) {
    showErr('Unhandled promise: ' + ((e.reason && e.reason.message) || e.reason || 'unknown'));
  });
})();
</script>
</head>
<body>

<div id="screen-title" class="screen">
  <div class="title-inner">
    <div class="title-ants" aria-hidden="true"><span>🐜</span><span>🐜</span><span>🐜</span></div>
    <h1 class="logo">GRUBS<span class="logo-td">TD</span></h1>
    <p class="title-primer">Ants vs. picnic pests. Place ants along the trail and pop the bugs
      before they reach your basket.</p>
    <button id="btn-title-play" class="sticker big-btn">▶ Play</button>
    <p id="title-newhint" class="title-newhint hidden">New here? Play starts a short guided game.</p>
    <div class="title-row">
      <button id="btn-howto" class="sticker mini-btn">❔ How to Play</button>
      <button id="btn-levels" class="sticker mini-btn">🗺 Levels &amp; Modes</button>
    </div>
    <div class="title-foot">
      <button id="btn-title-ach" class="sticker mini-btn" title="Achievements">🏆</button>
      <button id="btn-title-stats" class="sticker mini-btn" title="Lifetime stats">📊</button>
      <button id="btn-title-perks" class="sticker mini-btn" title="Colony perks">🍯</button>
      <button id="btn-title-sound" class="sticker mini-btn" title="Sound on/off">🔊</button>
    </div>
  </div>
</div>

<div id="screen-menu" class="screen hidden">
  <div class="menu-inner">
    <button id="btn-menu-back" class="sticker mini-btn menu-back">← Title</button>
    <h1 class="logo">GRUBS<span class="logo-td">TD</span></h1>
    <p class="tagline">Pest bugs are marching on the colony's sugar stash.<br>The ants answer.</p>
    <div id="map-cards"></div>
    <div id="diff-row"></div>
    <button id="btn-play" class="sticker big-btn">🐜 Defend the stash!</button>
    <p class="menu-foot">Sugar buys ants · Crumbs are lives · Survive 40 rounds</p>
  </div>
</div>

<div id="screen-game" class="screen hidden">
  <div id="hud"></div>
  <div id="main-row">
    <div id="playfield">
      <canvas id="game-canvas" width="960" height="640" tabindex="0"
              aria-label="Game board. Pick an ant with keys 1-9, click the grass to place it. Space starts the round."></canvas>
    </div>
    <div id="sidebar">
      <div id="shop"></div>
      <div id="panel"></div>
    </div>
  </div>
</div>

<div id="modal" class="hidden">
  <div id="modal-card" class="sticker"></div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
